server:
    bind:
        host: 0.0.0.0
        port: 5000
    url: http://localhost:5000/
    mimetype: application/json; charset=UTF-8
    encoding: utf-8
    gzip: false
    languages:
        # First language is the default language
        - en-US
        - fr-CA
    cors: true
    pretty_print: true
    limits:
        default_items: 10
        max_items: 10
    # templates: /path/to/templates
    map:
        url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
        attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap contributors</a>'
    manager:
        name: TinyDB
        connection: /tmp/pygeoapi-test-process-manager.db
        output_dir: /tmp

logging:
    level: DEBUG
    #logfile: /tmp/pygeoapi.log

metadata:
    identification:
        title:
            en: pygeoapi default instance
            fr: instance par défaut de pygeoapi
        description:
            en: pygeoapi provides an API to geospatial data
            fr: pygeoapi fournit une API aux données géospatiales
        keywords:
            en:
                - geospatial
                - data
                - api
            fr:
                - géospatiale
                - données
                - api
        keywords_type: theme
        terms_of_service: https://creativecommons.org/licenses/by/4.0/
        url: http://example.org
    license:
        name:
            en: CC-BY 4.0 license
            fr: license CC-BY 4.0 license
        url:
            en: https://creativecommons.org/licenses/by/4.0/
            fr: https://creativecommons.org/licenses/by/4.0/
    provider:
        name:
            en: Organization Name
            fr: nom d'organisation
        url:
            en: https://pygeoapi.io
            fr: https://pygeoapi.io
    contact:
        name:
            en: Lastname, Firstname
            fr: nom de famille, nom
        position:
            en: Position Title
            fr: titre du poste
        address:
            en: Mailing Address
            fr: address postale
        city:
            en: City
            fr: ville
        stateorprovince:
            en: Administrative Area
            fr: zone administrative
        postalcode:
            en: Zip or Postal Code
            fr: code postale
        country:
            en: Country
            fr: pays
        phone:
            en: +xx-xxx-xxx-xxxx
            fr: +xx-xxx-xxx-xxxx
        fax:
            en: +xx-xxx-xxx-xxxx
            fr: +xx-xxx-xxx-xxxx
        email: you@example.org
        url:
            en: Contact URL
            fr: URL de contact
        hours:
            en: Hours of Service
            fr: heures de service
        instructions:
            en: During hours of service.  Off on weekends.
            fr: pendant les heures de service. Fermé le week-end.
        role: pointOfContact

resources:
    obs:
        type: collection
        title:
            en: Observations
            fr: Observations
        description:
            en: My cool observations
            fr: Mes belles observations
        keywords:
            - observations
            - monitoring
        links:
            - type: text/csv
              rel: canonical
              title: data
              href: https://github.com/mapserver/mapserver/blob/branch-7-0/msautotest/wxs/data/obs.csv
              hreflang: en-US
            - type: text/csv
              rel: alternate
              title: data
              href: https://raw.githubusercontent.com/mapserver/mapserver/branch-7-0/msautotest/wxs/data/obs.csv
              hreflang: en-US
        linked-data:
            context:
                - schema: https://schema.org/
                  stn_id:
                      "@id": schema:identifier
                      "@type": schema:Text
                  datetime:
                      "@type": schema:DateTime
                      "@id": schema:observationDate
                  value:
                      "@type": schema:Number
                      "@id": schema:QuantitativeValue
        extents:
            spatial:
                bbox: [-180,-90,180,90]
                crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
            temporal:
                begin: 2000-10-30T18:24:39Z
                end: 2007-10-30T08:57:29Z
                trs: http://www.opengis.net/def/uom/ISO-8601/0/Gregorian
                resolution: P1D
                default: 2000-10-30T18:24:39Z
        providers:
            - type: feature
              name: CSV
              data: tests/data/obs.csv
              crs:
                - http://www.opengis.net/def/crs/OGC/1.3/CRS84
                - http://www.opengis.net/def/crs/EPSG/0/4326
                - http://www.opengis.net/def/crs/EPSG/0/3857
                - http://www.opengis.net/def/crs/EPSG/0/28992
              storage_crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
              id_field: id
              geometry:
                  x_field: long
                  y_field: lat
